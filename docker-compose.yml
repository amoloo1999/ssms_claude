version: "3.8"

services:
  backend:
    build: ./backend
    container_name: sql-studio-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sql-studio-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
